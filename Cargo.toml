[package]
name = "clmd"
version = "0.1.0"
edition = "2021"

[features]
default = ["rc-refcell"]
rc-refcell = []
arena = []

[dependencies]
thiserror = "1.0"
regex = "1.10"
htmlescape = "0.3"
bumpalo = { version = "3.14", features = ["collections"] }

[dev-dependencies]
criterion = "0.5"

[profile.release]
debug = true

[[bench]]
name = "parser_bench"
harness = false

[[bench]]
name = "categorized_benchmark"
harness = false
