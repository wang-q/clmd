[package]
name = "clmd"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "1.0"
regex = "1.10"
htmlescape = "0.3"
bumpalo = { version = "3.14", features = ["collections"] }
rustc-hash = "1.1"
smallvec = "1.13"
comrak = { path = "./comrak-0.51.0", optional = true }
pulldown-cmark = { path = "./pulldown-cmark-0.13.3/pulldown-cmark", optional = true }

[dev-dependencies]
criterion = "0.5"

[profile.release]
debug = true

# Benchmarks
[[bench]]
name = "categorized_benchmark"
harness = false

[[bench]]
name = "feature_benchmark"
harness = false

[[bench]]
name = "pathological_benchmark"
harness = false

[[bench]]
name = "real_world_benchmark"
harness = false

[[bench]]
name = "sequence_benchmark"
harness = false

# Examples - Benchmarks
[[example]]
name = "cross_language_bench"
path = "examples/bench/cross_language_bench.rs"

[[example]]
name = "cross_rust_bench"
path = "examples/bench/cross_rust_bench.rs"
required-features = ["comrak", "pulldown-cmark"]

[[example]]
name = "flamegraph_bench"
path = "examples/bench/flamegraph_bench.rs"

# Examples - Comparisons
[[example]]
name = "arena_comparison"
path = "examples/compare/arena_comparison.rs"
