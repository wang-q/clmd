[package]
name = "clmd"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "1.0"
regex = "1.10"
htmlescape = "0.3"
bumpalo = { version = "3.14", features = ["collections"] }
rustc-hash = "1.1"
smallvec = "1.13"

[dev-dependencies]
criterion = "0.5"

[profile.release]
debug = true

[[bench]]
name = "parser_bench"
harness = false

[[bench]]
name = "categorized_benchmark"
harness = false

[[bench]]
name = "parse_benchmark"
harness = false
